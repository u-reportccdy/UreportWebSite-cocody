name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Checkout du code"
        uses: actions/checkout@v4

      - name: "⚙️ Configuration de Node.js (v18)"
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # --- FRONTEND ---
      - name: "🎨 Installation des dépendances (Frontend)"
        working-directory: ./frontend
        run: npm install

      - name: "🏗️ Build du Frontend"
        working-directory: ./frontend
        run: npm run build

      # --- BACKEND ---
      - name: "🔌 Installation des dépendances (Backend)"
        working-directory: ./backend
        run: npm install

      - name: "🚀 Vérification de démarrage (Backend)"
        working-directory: ./backend
        run: |
          # On vérifie si index.js existe ou si un script start est présent
          if [ -f "index.js" ]; then
            node index.js & sleep 5 && kill $!
          elif npm run | grep -q "start"; then
            npm run start & sleep 5 && kill $!
          else
            echo "Avertissement : Aucun point d'entrée trouvé pour tester le démarrage."
          fi
